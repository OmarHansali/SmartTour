spring:
  application:
    name: smarttour-backend
  datasource:
    url: jdbc:h2:mem:smarttourdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

server:
  port: 8081

smarttour:
  google-maps:
    api-key: ${GOOGLE_MAPS_API_KEY:your_api_key}
  ar:
    confidence-threshold: 0.6
  trip:
    max-places-per-trip: 5
    default-radius-meters: 5000
